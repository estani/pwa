<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0e0e11">
  <title>Soundboard PWA</title>

  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="icon.png"> <!-- Assume icon.png exists or will be created -->

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap"
    rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <div class="app">

    <!-- Header -->
    <header class="header">
      <h1>⬡ Soundboard</h1>
      <div class="header-right">
        <button class="btn btn-ghost" id="add-btn">+ Add track</button>
      </div>
    </header>

    <!-- Main Content -->
    <main class="scrollable">

      <!-- Now Playing Card -->
      <section class="now-playing" id="now-playing">
        <div class="np-top">
          <div class="np-icon" id="np-icon">♪</div>
          <div class="np-info">
            <p class="np-label">Now playing</p>
            <h2 class="np-title" id="np-title">
              <span class="np-empty" id="np-empty">No track loaded — tap one below</span>
            </h2>
            <div class="np-meta" id="np-meta"></div>
          </div>
        </div>

        <div class="progress-wrap">
          <div style="display:flex; align-items:center; gap:12px; margin-bottom:8px;">
            <button class="btn btn-icon" style="padding:0; font-size:16px; width:24px; height:24px; display:flex; align-items:center; justify-content:center; flex-shrink:0;" onclick="window.UI.seekToStart()" title="Restart track">⏮</button>
            <div class="progress-bar-container" id="progress-bar" style="margin-bottom:0; flex:1;">
              <div class="progress-fill" id="progress-fill"></div>
            </div>
          </div>
          <div class="progress-times">
            <span id="time-current">0:00</span>
            <span id="time-total">0:00</span>
          </div>
        </div>

        <div class="transport">
          <button class="btn-play-large" id="play-btn">▶</button>
          <div class="vol-wrap">
            <span class="vol-icon">🔈</span>
            <input type="range" class="vol-slider" id="vol-slider" min="0" max="100" value="80">
            <span class="vol-icon">🔊</span>
          </div>
        </div>

        <div class="fade-section">
          <div class="fade-group">
            <span class="fade-label">Fade in</span>
            <div class="fade-btns" id="fade-in-btns">
              <button class="fade-btn" onclick="window.UI.setFadeIn(this,0)">off</button>
              <button class="fade-btn" onclick="window.UI.setFadeIn(this,1)">1s</button>
              <button class="fade-btn active" onclick="window.UI.setFadeIn(this,5)">5s</button>
              <button class="fade-btn" onclick="window.UI.setFadeIn(this,10)">10s</button>
            </div>
          </div>
          <div class="fade-group">
            <span class="fade-label">Fade out</span>
            <div class="fade-btns" id="fade-out-btns">
              <button class="fade-btn" onclick="window.UI.setFadeOut(this,0)">off</button>
              <button class="fade-btn" onclick="window.UI.setFadeOut(this,1)">1s</button>
              <button class="fade-btn active" onclick="window.UI.setFadeOut(this,5)">5s</button>
              <button class="fade-btn" onclick="window.UI.setFadeOut(this,10)">10s</button>
            </div>
          </div>
        </div>
      </section>

      <!-- Sections Container -->
      <div id="section-library" class="section active">

        <!-- Filter Bar -->
        <div class="filter-bar">
          <button class="filter-btn" onclick="window.UI.toggleCollapse('genre-chips', this)">GENRE <span class="collapse-icon">▼</span></button>
          <button class="filter-btn" onclick="window.UI.toggleCollapse('mood-chips', this)">MOOD <span class="collapse-icon">▼</span></button>
          <button class="filter-btn" onclick="window.UI.toggleCollapse('tag-chips', this)">TAGS <span class="collapse-icon">▼</span></button>
          <button class="filter-btn icon-only" onclick="window.UI.toggleCollapse('search-wrapper', this)"><span style="color:var(--text)">🔍</span></button>
        </div>

        <!-- Filter Contents -->
        <div class="filter-contents">
          <div class="filter-chips expandable" id="genre-chips" style="display:none; margin-bottom: 12px;"></div>
          <div class="filter-chips expandable" id="mood-chips" style="display:none; margin-bottom: 12px;"></div>
          <div class="filter-chips expandable" id="tag-chips" style="display:none; margin-bottom: 12px;"></div>
          <div id="search-wrapper" class="expandable" style="display:none; position:relative; margin-bottom: 12px;">
            <span class="search-icon">🔍</span>
            <input class="search-input" id="search-input" type="search" placeholder="Search tracks or tags…">
          </div>
        </div>

        <!-- Track List -->
        <div class="track-list" id="track-list"></div>
      </div>

      <div id="section-find" class="section">
        <div class="info-card">
          <h3>🆓 Free music sources</h3>
          <p>Royalty-free tracks for your show:</p>
          <div class="source-row" style="display:flex; flex-wrap:wrap; gap:8px; margin-top:10px;">
            <a class="chip" style="text-decoration:none" href="https://pixabay.com/music/" target="_blank">Pixabay</a>
            <a class="chip" style="text-decoration:none" href="https://freesound.org" target="_blank">Freesound</a>
            <a class="chip" style="text-decoration:none" href="https://incompetech.com" target="_blank">Incompetech</a>
          </div>
        </div>
      </div>

      <div id="section-status" class="section">
        <div class="info-card" id="status-content">
          <!-- Populated by UI.renderStatus -->
        </div>
      </div>

    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
      <div class="nav-item active" data-section="library">
        <div class="nav-icon">♪</div>
        <div class="nav-label">Library</div>
      </div>
      <div class="nav-item" data-section="find">
        <div class="nav-icon">⊕</div>
        <div class="nav-label">Find</div>
      </div>
      <div class="nav-item" data-section="status">
        <div class="nav-icon">📊</div>
        <div class="nav-label">Status</div>
      </div>
    </nav>

  </div>

  <!-- Modal Templates -->
  <template id="tpl-add">
    <div class="modal-overlay">
      <div class="modal">
        <h3>Add Soundtrack</h3>
        <p class="sub">Choose a file and tag it with multiple genres/moods</p>

        <div class="form-group">
          <label class="form-label">Audio File</label>
          <div id="file-pick-area" class="btn-ghost"
            style="padding:24px; text-align:center; border: 1px dashed var(--accent); cursor:pointer; background: var(--surface-hover)"
            onclick="window.UI.pickFileUnified()">
            <span style="font-size:32px">📁</span>
            <p id="file-label" style="font-size:14px; margin-top:8px; color: var(--text)">Choose Soundtrack File</p>
            <p class="sub" style="margin-top:4px; font-size:10px">Persistent Mode will be used if your browser supports
              it.</p>
          </div>
          <input type="file" id="file-input" accept="audio/*" style="display:none"
            onchange="window.UI.onFileChosen(this)">
        </div>

        <div class="form-group">
          <div style="display:flex; justify-content:space-between; align-items:flex-end; margin-bottom: 4px">
            <label class="form-label" style="margin-bottom:0">Display Name (optional)</label>
            <button class="btn btn-ghost" style="font-size:10px; padding:2px 8px"
              onclick="window.UI.fillNameFromFilename()">Use Filename</button>
          </div>
          <input class="form-input" id="track-name-input" type="text" placeholder="Leave empty to use tags as title">
        </div>

        <div class="form-group"
          style="display:flex; align-items:center; gap:10px; padding:12px; background:var(--surface-active); border-radius:8px; border:1px solid var(--border)">
          <input type="checkbox" id="store-blob-input" style="width:20px; height:20px; accent-color:var(--accent)">
          <label for="store-blob-input" style="font-size:13px; color:var(--text); cursor:pointer">
            Store file in browser (offline)
            <div style="font-size:10px; color:var(--text-dim); margin-top:2px">Saves the whole audio file for true
              persistence (takes more space).</div>
          </label>
        </div>

        <div class="filter-bar" style="margin-bottom: 12px;">
          <button class="filter-btn" onclick="window.UI.toggleCollapse('genre-picks', this)">GENRES <span class="collapse-icon">▼</span></button>
          <button class="filter-btn" onclick="window.UI.toggleCollapse('mood-picks', this)">MOODS <span class="collapse-icon">▼</span></button>
          <button class="filter-btn" onclick="window.UI.toggleCollapse('tag-picks', this)">TAGS <span class="collapse-icon">▼</span></button>
        </div>

        <div class="filter-contents">
          <div class="tag-pick-grid expandable" id="genre-picks" style="display:none; margin-bottom: 20px;"></div>
          <div class="tag-pick-grid expandable" id="mood-picks" style="display:none; margin-bottom: 20px;"></div>
          <div class="tag-pick-grid expandable" id="tag-picks" style="display:none; margin-bottom: 20px;"></div>
        </div>

        <div style="display:flex; gap:12px; margin-top:24px;">
          <button class="btn btn-ghost" style="flex:1" onclick="window.UI.closeModal()">Cancel</button>
          <button class="btn btn-accent" id="confirm-add-btn" style="flex:2" onclick="window.UI.confirmAddTrack()">Add
            to Library</button>
        </div>
      </div>
    </div>
  </template>

  <!-- Load Modules -->
  <script type="module" src="js/app.js"></script>
</body>

</html>
